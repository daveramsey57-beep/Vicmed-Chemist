<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediCare Pharmacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .role-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .role-card {
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .role-card:hover {
            border-color: #3498db;
            background: #f8fafc;
        }
        .role-card.selected {
            border-color: #3498db;
            background: #eff6ff;
        }
        .role-card i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }
        .role-card.user-card i { color: #10b981; }
        .role-card.admin-card i { color: #8b5cf6; }
        .role-card span {
            display: block;
            font-weight: 600;
            color: #1e293b;
        }
        .role-card small {
            color: #64748b;
            font-size: 0.8rem;
        }
        .user-role { color: #10b981; }
        .admin-role { color: #8b5cf6; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-header">
                <i class="fa-solid fa-pills"></i>
                <h1>ALPHA PHARMACY</h1>
                <p>Inventory Management System</p>
            </div>

            <div class="role-selection">
                <div class="role-card user-card" onclick="selectRole('user')">
                    <i class="fa-solid fa-user"></i>
                    <span>User</span>
                    <small>Sell Only</small>
                </div>
                <div class="role-card admin-card" onclick="selectRole('admin')">
                    <i class="fa-solid fa-user-shield"></i>
                    <span>Admin</span>
                    <small>Full Access</small>
                </div>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-group">
                        <i class="fa-solid fa-at"></i>
                        <input type="text" id="username" placeholder="Enter username" required />
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter password" required />
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fa-solid fa-sign-in-alt"></i> Login
                </button>
                <p id="loginError" class="error-message"></p>
            </form>

            <p style="text-align: center; margin-top: 20px; color: #64748b; font-size: 0.85rem;">
                <b>User:</b> @user001 / user254<br>
                <b>Admin:</b> @admin2047 / dave247
            </p>
        </div>
    </div>

    <script>
        // Clear any existing session when arriving at login page
        if (window.location.href.includes('login.html')) {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('role');
        }
        
        let selectedRole = 'user';
        
        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-card').forEach(card => card.classList.remove('selected'));
            if (role === 'user') {
                document.querySelector('.user-card').classList.add('selected');
            } else {
                document.querySelector('.admin-card').classList.add('selected');
            }
        }

        selectRole('user');

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('loginError');

            const validUsers = {
                '@user001': 'user254',
                '@admin2047': 'dave247'
            };

            if (validUsers[username] && validUsers[username] === password) {
                const isAdmin = username === '@admin2047';
                localStorage.setItem('role', isAdmin ? 'admin' : 'user');
                localStorage.setItem('isLoggedIn', 'true');
                
                // Small delay to ensure localStorage is saved
                setTimeout(function() {
                    window.location.href = 'index.html?t=' + new Date().getTime();
                }, 100);
            } else {
                errorMessage.textContent = 'Invalid username or password';
                setTimeout(() => { errorMessage.textContent = ''; }, 3000);
            }
        });
    </script>
</body>
</html>
